networks:
  macvlan_network:
    driver: macvlan
    driver_opts:
      parent: enp1s0 #check name network adapter "ip a"
    ipam:
      driver: default
      config:
       - subnet: 192.168.255.0/24
         ip_range: 192.168.255.0/24
         gateway: 192.168.255.1
