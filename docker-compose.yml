services:
  mihomo-proxy-ros:
    environment:
      FAKE_IP_RANGE: "198.18.0.0/15"
      FAKE_IP_FILTER: "www.youtube.com"
      LOG_LEVEL: "error"
      BYEDPI: "true"
      BYEDPI_CMD: "--disorder 1 --fake 0 --ttl 1 --auto=torst --tlsrec 1+s --debug 1" #paste your strategy BYEDPI
      BYEDPI_CMD_UDP: "--disorder 1 --fake 0 --ttl 1 --auto=torst --tlsrec 1+s --debug 1" #paste your strategy BYEDPI
      GROUP: "youtube,telegram,discord,amazon"
      YOUTUBE_GEOSITE: "youtube"
      YOUTUBE_PRIORITY: "1"
      TELEGRAM_GEOSITE: "telegram"
      TELEGRAM_GEOIP: "telegram"
      TELEGRAM_AS: "AS62041,AS59930,AS62014,AS211157,AS44907"
      TELEGRAM_PRIORITY: "2"
      DISCORD_GEOSITE: "discord"
      DISCORD_GEOIP: "discord"
      AMAZON_AS: "AS16509"
      LINK1: " " #paste your link proxy
      SUB_LINK1: " " #paste your sublink proxyies
    image: ghcr.io/medium1992/mihomo-proxy-ros
    restart: unless-stopped
    container_name: mihomo-proxy-ros
    volumes:
      - ./awg_conf/:/root/.config/mihomo/awg/ #use dir with wg,awg conf
      - /dev/net/tun:/dev/net/tun
#    cap_add:
#      - ALL
    networks:
      macvlan_network:
        ipv4_address: 192.168.255.2

