client
dev tun
proto udp
remote vpn.example.com 1194
nobind
persist-key
persist-tun

cipher AES-256-GCM
auth SHA256
verb 3

# auth-user-pass mode
<auth-user-pass>
user
pass
</auth-user-pass>

<ca>
-----BEGIN CERTIFICATE-----
MIIB...example
-----END CERTIFICATE-----
</ca>

# Optional client certificate mode
# <cert>
# -----BEGIN CERTIFICATE-----
# MIIB...example
# -----END CERTIFICATE-----
# </cert>
#
# <key>
# -----BEGIN PRIVATE KEY-----
# MIIE...example
# -----END PRIVATE KEY-----
# </key>

# Optional tls-crypt. mihomo currently exposes tls-crypt in YAML.
# <tls-crypt>
# -----BEGIN OpenVPN Static key V1-----
# 00000000000000000000000000000000
# -----END OpenVPN Static key V1-----
# </tls-crypt>
